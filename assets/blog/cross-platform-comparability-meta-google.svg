      <text x="24" y="52" font-family="'Geist Mono',monospace" font-size="16" fill="#6c685f">Google</text>
      <text x="24" y="104" font-family="'Fraunces',serif" font-size="52" font-style="italic" font-weight="500" fill="#1c1a17">3.1×</text>
